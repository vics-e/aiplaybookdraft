document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

src: url(\"d49620b4-bf66-4781-853e-324059fc7cf4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"background: #0B0B0B; min-height: 100vh; font-family: 'DM Sans', sans-serif; color: #E8E8E8; padding: 48px 0;\">\n  <div style=\"max-width: 800px; margin: 0 auto; padding: 0 32px;\">\n\n    <!-- Section Tag -->\n    <div style=\"margin-bottom: 20px;\">\n      <span style=\"display: inline-block; background: #22C55E; color: #0B0B0B; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 14px; border-radius: 4px;\">Section 3: Assistants &amp; Agents<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Title -->\n    <h1 style=\"font-family: 'DM Serif Display', serif; font-size: 40px; font-weight: 400; color: #FFFFFF; margin: 0 0 8px 0; line-height: 1.15;\">The Workflow Map: Where Agents Work Best<\u002Fh1>\n\n    <!-- Subtitle -->\n    <p style=\"font-size: 18px; color: #999; margin: 0 0 20px 0; font-style: italic; line-height: 1.5;\">Mapping your firm's processes to identify agent opportunities<\u002Fp>\n\n    <!-- Intro paragraph -->\n    <p style=\"font-size: 15px; color: #999; margin: 0 0 32px 0; line-height: 1.7;\">Not all workflows are equal candidates for agent automation. Some are perfectly suited; others require too much judgement, involve unstructured data, or occur too infrequently to justify the setup effort.<\u002Fp>\n\n    <!-- Combined Exercise + Steps Card -->\n    <div style=\"background: #131313; border: 1px solid #1E1E1E; border-radius: 10px; padding: 28px; margin-bottom: 28px;\">\n      <h3 style=\"font-size: 17px; font-weight: 700; color: #FFFFFF; margin: 0 0 8px 0;\">The Workflow Mapping Exercise<\u002Fh3>\n      <p style=\"font-size: 14px; color: #888; margin: 0 0 24px 0; line-height: 1.6;\">This exercise helps you identify which workflows in your firm are strong agent candidates and which should remain human-led or assistant-supported.<\u002Fp>\n\n      <!-- Step Tabs Row -->\n      <div style=\"display: flex; gap: 0; margin-bottom: 0; position: relative;\">\n        <div style=\"position: absolute; top: 16px; left: 24px; right: 24px; height: 2px; background: #1E1E1E; z-index: 0;\"><\u002Fdiv>\n        <sc-for list=\"{{ steps }}\" as=\"step\">\n          <button onclick=\"{{ step.select }}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; background: none; border: none; cursor: pointer; padding: 0 4px 16px; position: relative; z-index: 1;\">\n            <div style=\"width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; transition: all 0.2s ease; background: {{ step.bgColor }}; color: {{ step.textColor }};\">{{ step.num }}<\u002Fdiv>\n            <span style=\"font-size: 12px; font-weight: 600; transition: color 0.2s ease; color: {{ step.labelColor }};\">{{ step.label }}<\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Active Step Content -->\n      <div style=\"background: #0E0E0E; border: 1px solid #1A1A1A; border-radius: 8px; padding: 20px; margin-top: 4px;\">\n        <div style=\"display: flex; align-items: flex-start; gap: 12px;\">\n          <div style=\"min-width: 28px; height: 28px; border-radius: 6px; background: #22C55E; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #0B0B0B; margin-top: 1px;\">{{ activeStepNum }}<\u002Fdiv>\n          <div>\n            <div style=\"font-size: 15px; font-weight: 700; color: #FFFFFF; margin-bottom: 6px;\">{{ activeStepTitle }}<\u002Fdiv>\n            <p style=\"font-size: 14px; color: #999; margin: 0; line-height: 1.65;\">{{ activeStepDesc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Quote -->\n    <div style=\"border-left: 3px solid #22C55E; padding: 16px 24px; margin-bottom: 28px;\">\n      <p style=\"font-size: 15px; font-weight: 700; color: #FFFFFF; margin: 0; line-height: 1.55; font-style: italic;\">The goal is not to automate everything. It's to identify where agents create the most value with the least risk.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Common High-Impact Agent Candidates - Collapsible -->\n    <div style=\"background: #131313; border: 1px solid #1E1E1E; border-radius: 10px; padding: 24px; margin-bottom: 48px;\">\n      <div style=\"display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;\">\n        <div>\n          <h3 style=\"font-size: 15px; font-weight: 700; color: #FFFFFF; margin: 0 0 4px 0;\">Common High-Impact Agent Candidates:<\u002Fh3>\n          <p style=\"font-size: 13px; color: #777; margin: 0;\">These are examples to help you think of your own workflows.<\u002Fp>\n        <\u002Fdiv>\n        <button onclick=\"{{ toggleExamples }}\" style=\"background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 8px 16px; font-size: 11px; font-weight: 700; color: #ccc; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; font-family: 'DM Sans', sans-serif;\">\n          {{ examplesLabel }}\n          <span style=\"font-size: 14px; transition: transform 0.2s ease; display: inline-block; transform: {{ chevronRotation }};\">›<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showExamples }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; padding-top: 20px; border-top: 1px solid #1E1E1E;\">\n          <sc-for list=\"{{ candidates }}\" as=\"candidate\">\n            <span style=\"display: inline-block; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 9px 18px; font-size: 14px; color: #ccc; font-weight: 500; white-space: nowrap;\">{{ candidate }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- Divider -->\n    <div style=\"height: 1px; background: #1E1E1E; margin-bottom: 48px;\"><\u002Fdiv>\n\n    <!-- Activity Section -->\n    <div style=\"margin-bottom: 48px;\">\n      <div style=\"display: flex; align-items: center; gap: 14px; margin-bottom: 8px;\">\n        <div style=\"width: 36px; height: 36px; border-radius: 8px; background: #131313; border: 1px solid #1E1E1E; display: flex; align-items: center; justify-content: center;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#22C55E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"><\u002Fline><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"><\u002Fline><polyline points=\"10 9 9 9 8 9\"><\u002Fpolyline><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size: 11px; font-weight: 700; color: #22C55E; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px;\">Activity<\u002Fdiv>\n          <h2 style=\"font-family: 'DM Serif Display', serif; font-size: 26px; font-weight: 400; color: #FFFFFF; margin: 0;\">Map Your Workflows<\u002Fh2>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-size: 14px; color: #777; margin: 0 0 28px 0; line-height: 1.5;\">Complete the workflow mapping exercise for your firm:<\u002Fp>\n\n      <div style=\"background: #131313; border: 1px solid #1E1E1E; border-radius: 12px; padding: 28px;\">\n        <x-import component=\"WorkflowMapper\" from=\"8532601e-506c-46a7-8b9f-3f923bc2b4b1#/workflow-mapper.jsx\" hint-size=\"100%,300px\"><\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = { activeStep: 0, showExamples: false };\n\n  renderVals() {\n    const stepData = [\n      {\n        num: \"1\",\n        label: \"List\",\n        title: \"Step 1: List your workflows\",\n        desc: \"Write down 10\\u201315 common workflows or processes in your firm (e.g., monthly reporting, client onboarding, tax return preparation, payroll processing).\"\n      },\n      {\n        num: \"2\",\n        label: \"Score\",\n        title: \"Step 2: Score each workflow\",\n        desc: \"For each workflow, rate it on two dimensions: \\u00b7 Repeatability (1\\u20135): How often is this done? How consistent are the steps? \\u00b7 Judgement Requirement (1\\u20135): How much professional interpretation is needed?\"\n      },\n      {\n        num: \"3\",\n        label: \"Plot\",\n        title: \"Step 3: Plot the results\",\n        desc: \"High repeatability + Low judgement = Strong agent candidate. High repeatability + High judgement = Human-led with assistant support. Low repeatability + Low judgement = Assistant task. Low repeatability + High judgement = Fully human-led.\"\n      },\n      {\n        num: \"4\",\n        label: \"Prioritise\",\n        title: \"Step 4: Prioritise\",\n        desc: \"From your strong agent candidates, choose 1\\u20132 workflows to start with based on impact, data availability, and team readiness.\"\n      }\n    ];\n\n    const active = this.state.activeStep;\n\n    const steps = stepData.map((s, i) => ({\n      ...s,\n      select: () => this.setState({ activeStep: i }),\n      bgColor: i === active ? \"#22C55E\" : i < active ? \"rgba(34,197,94,0.25)\" : \"#1A1A1A\",\n      textColor: i === active ? \"#0B0B0B\" : i < active ? \"#22C55E\" : \"#555\",\n      labelColor: i === active ? \"#22C55E\" : \"#666\"\n    }));\n\n    const candidates = [\n      \"Quarterly business reviews\",\n      \"Period-end preparation\",\n      \"Client onboarding and document collection\",\n      \"Outstanding item chasing\",\n      \"Compliance deadline tracking\",\n      \"Payroll query handling\",\n      \"Expense claim review\",\n      \"Bank reconciliation support\"\n    ];\n\n    const showExamples = this.state.showExamples;\n\n    return {\n      steps,\n      activeStep: active,\n      activeStepNum: stepData[active].num,\n      activeStepTitle: stepData[active].title,\n      activeStepDesc: stepData[active].desc,\n      candidates,\n      showExamples,\n      examplesLabel: showExamples ? \"Hide examples\" : \"Show examples\",\n      chevronRotation: showExamples ? \"rotate(90deg)\" : \"rotate(0deg)\",\n      toggleExamples: () => this.setState({ showExamples: !this.state.showExamples })\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
